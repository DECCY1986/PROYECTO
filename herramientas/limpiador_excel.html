<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIMALCCO | Limpiador Finanzas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .drag-active {
            border-color: #38bdf8 !important;
            background: rgba(56, 189, 248, 0.1) !important;
            transform: scale(1.02);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .checkbox-custom:checked + div {
            background-color: #6366f1;
            border-color: #6366f1;
        }
        
        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-panel w-full max-w-2xl rounded-3xl p-8 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-fuchsia-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-500 mb-2">
                    Data Purifier Pro 🔥
                </h1>
                <p class="text-slate-400 font-light">Herramienta Avanzada de Limpieza de Flujos de Caja para DIMALCCO</p>
            </div>

            <div class="space-y-6">
                <!-- Opciones de limpieza -->
                <div class="glass-panel rounded-xl p-5 border border-slate-700/50">
                    <h3 class="text-lg font-semibold text-sky-200 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Parámetros de Limpieza
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="flex items-start space-x-3 cursor-pointer group">
                            <div class="relative flex items-center justify-center mt-1">
                                <input type="checkbox" id="cleanMoney" class="checkbox-custom opacity-0 absolute h-5 w-5 cursor-pointer z-20" checked>
                                <div class="h-5 w-5 border-2 border-slate-500 rounded transition-colors group-hover:border-sky-400 flex items-center justify-center z-10">
                                    <svg class="w-3 h-3 text-white opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                            <div class="flex-1">
                                <span class="text-slate-200 font-medium block">Formato Moneda a Número</span>
                                <span class="text-xs text-slate-400">Convierte " $ 6,400,000 " a 6400000 para que Excel pueda sumarlos correctamente.</span>
                            </div>
                        </label>

                        <label class="flex items-start space-x-3 cursor-pointer group">
                            <div class="relative flex items-center justify-center mt-1">
                                <input type="checkbox" id="trimText" class="checkbox-custom opacity-0 absolute h-5 w-5 cursor-pointer z-20" checked>
                                <div class="h-5 w-5 border-2 border-slate-500 rounded transition-colors group-hover:border-sky-400 flex items-center justify-center z-10">
                                    <svg class="w-3 h-3 text-white opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                            <div class="flex-1">
                                <span class="text-slate-200 font-medium block">Recortar Textos</span>
                                <span class="text-xs text-slate-400">Elimina espacios dobles y espacios en blanco al inicio y final.</span>
                            </div>
                        </label>

                        <label class="flex items-start space-x-3 cursor-pointer group">
                            <div class="relative flex items-center justify-center mt-1">
                                <input type="checkbox" id="uppercase" class="checkbox-custom opacity-0 absolute h-5 w-5 cursor-pointer z-20">
                                <div class="h-5 w-5 border-2 border-slate-500 rounded transition-colors group-hover:border-sky-400 flex items-center justify-center z-10">
                                    <svg class="w-3 h-3 text-white opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                            <div class="flex-1">
                                <span class="text-slate-200 font-medium block">Convertir a MAYÚSCULAS</span>
                                <span class="text-xs text-slate-400">Estandariza los nombres, categorías o descripciones a mayúscula cerrada.</span>
                            </div>
                        </label>

                        <label class="flex items-start space-x-3 cursor-pointer group">
                            <div class="relative flex items-center justify-center mt-1">
                                <input type="checkbox" id="removeEmpty" class="checkbox-custom opacity-0 absolute h-5 w-5 cursor-pointer z-20" checked>
                                <div class="h-5 w-5 border-2 border-slate-500 rounded transition-colors group-hover:border-sky-400 flex items-center justify-center z-10">
                                    <svg class="w-3 h-3 text-white opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                            <div class="flex-1">
                                <span class="text-slate-200 font-medium block">Purgar Filas Vacías</span>
                                <span class="text-xs text-slate-400">Elimina las filas que no contengan ningún dato relevante.</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Zona Mágica Drag/Drop -->
                <div id="dropzone" class="border-2 border-dashed border-slate-600 rounded-2xl p-10 text-center transition-all duration-300 relative group cursor-pointer hover:border-sky-400 hover:bg-slate-800/30">
                    <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30" accept=".xlsx, .xls, .csv">
                    
                    <div class="bg-slate-800/80 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4 group-hover:bg-sky-500/20 transition-colors">
                        <svg class="w-10 h-10 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    
                    <h3 class="text-xl font-semibold mb-2 text-slate-100">Arrastra tu Excel aquí</h3>
                    <p class="text-slate-400 font-light max-w-sm mx-auto">o haz clic para explorar. Formatos soportados: .xlsx, .xls, .csv</p>
                </div>

                <div id="processingUI" class="hidden text-center py-6">
                    <div class="flex items-center justify-center mb-4">
                        <div class="loading-spinner mr-3"></div>
                        <span class="text-sky-300 font-medium text-lg animate-pulse" id="statusText">Analizando matriz de datos...</span>
                    </div>
                    <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full btn-gradient w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <div id="successUI" class="hidden text-center animate-fade-in-up py-4">
                    <div class="bg-emerald-500/20 border border-emerald-500/50 rounded-xl p-6">
                        <div class="mx-auto w-16 h-16 bg-emerald-500/30 rounded-full flex items-center justify-center mb-4">
                            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h3 class="text-2xl font-bold text-emerald-400 mb-2">¡Purificación Exitosa!</h3>
                        <p class="text-emerald-100 mb-6" id="statsText">Se limpiaron 0 celdas.</p>
                        
                        <button id="downloadBtn" class="btn-gradient text-white font-bold py-3 px-8 rounded-full shadow-lg flex items-center justify-center mx-auto w-full md:w-auto">
                            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Descargar Excel Limpio
                        </button>
                    </div>
                    <button class="text-slate-400 hover:text-white mt-4 text-sm underline" onclick="location.reload()">Limpiar otro archivo</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Checkbox styles fix
        document.querySelectorAll('.checkbox-custom').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const icon = e.target.nextElementSibling.querySelector('svg');
                if(e.target.checked) {
                    icon.classList.remove('opacity-0');
                } else {
                    icon.classList.add('opacity-0');
                }
            });
            // Initial state
            if(cb.checked) cb.nextElementSibling.querySelector('svg').classList.remove('opacity-0');
        });

        // UI Elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const processingUI = document.getElementById('processingUI');
        const successUI = document.getElementById('successUI');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const statsText = document.getElementById('statsText');
        const downloadBtn = document.getElementById('downloadBtn');

        let cleanDataWb = null;
        let originalFileName = "";

        // Drag events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.add('drag-active'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.remove('drag-active'), false);
        });

        dropzone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files), false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if(files.length === 0) return;
            const file = files[0];
            originalFileName = file.name;
            
            // Start Processing
            dropzone.classList.add('hidden');
            processingUI.classList.remove('hidden');
            
            setTimeout(() => {
                processExcel(file);
            }, 600);
        }

        async function processExcel(file) {
            try {
                // Read File
                updateProgress(20, "Leyendo archivo...");
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, {type: 'array', cellDates: true, cellNF: false, cellText: false});
                
                const newWorkbook = XLSX.utils.book_new();
                let totalCleaned = 0;
                let rowsRemoved = 0;

                // Get settings
                const optCleanMoney = document.getElementById('cleanMoney').checked;
                const optTrimText = document.getElementById('trimText').checked;
                const optUppercase = document.getElementById('uppercase').checked;
                const optRemoveEmpty = document.getElementById('removeEmpty').checked;

                const sheetsCount = workbook.SheetNames.length;

                workbook.SheetNames.forEach((sheetName, index) => {
                    updateProgress(40 + ((index/sheetsCount) * 40), `Limpiando hoja: ${sheetName}...`);
                    
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonRes = XLSX.utils.sheet_to_json(worksheet, {header: 1, raw: false, dateNF: 'yyyy-mm-dd'});
                    
                    const newJson = [];

                    jsonRes.forEach(row => {
                        // Check if row is empty
                        let isRowEmpty = true;
                        if(row && Array.isArray(row)) {
                            for(let i=0; i<row.length; i++) {
                                if(row[i] !== null && row[i] !== undefined && String(row[i]).trim() !== '') {
                                    isRowEmpty = false;
                                    break;
                                }
                            }
                        }

                        if(optRemoveEmpty && isRowEmpty) {
                            rowsRemoved++;
                            return; // Skip empty row
                        }

                        if(!isRowEmpty) {
                            const newRow = row.map(cell => {
                                if(cell === null || cell === undefined) return null;
                                
                                let cVal = String(cell);
                                let mod = false;

                                // Limpiar Dinero (ej. "$ 6,400,000 ")
                                if(optCleanMoney && /^\s*\$?\s*[\d,\.]+\s*$/.test(cVal) && !/^[a-zA-Z]+$/.test(cVal)) {
                                    if(cVal.includes('$')) {
                                        let numStr = cVal.replace(/\$/g, '').trim();
                                        // si tiene comas pero no punto, las comas son miles
                                        if(numStr.includes(',') && !numStr.includes('.')) {
                                            numStr = numStr.replace(/,/g, '');
                                        } 
                                        // si tiene comas para decimales, depende del local. Usualmente colombia usa . para miles y , para decimales, pero en formato string gringo coma es mil.
                                        // vamos a quitar todo lo que no sea dígito o punto/coma y usar parseFloat.
                                        numStr = numStr.replace(/,/g, '');
                                        
                                        let parsedObj = parseFloat(numStr);
                                        if(!isNaN(parsedObj)) {
                                            cVal = parsedObj;
                                            mod = true;
                                        }
                                    }
                                }

                                // Si sigue siendo string
                                if(typeof cVal === 'string') {
                                    if(optTrimText) {
                                        const trimmed = cVal.replace(/\s+/g, ' ').trim();
                                        if(trimmed !== cVal) mod = true;
                                        cVal = trimmed;
                                    }
                                    if(optUppercase && cVal.length > 0 && !/^\d+$/.test(cVal)) {
                                        const up = cVal.toUpperCase();
                                        if(up !== cVal) mod = true;
                                        cVal = up;
                                    }
                                }

                                if(mod) totalCleaned++;
                                return cVal;
                            });
                            newJson.push(newRow);
                        }
                    });

                    // Convert array of arrays back to sheet
                    const newWs = XLSX.utils.aoa_to_sheet(newJson);
                    XLSX.utils.book_append_sheet(newWorkbook, newWs, sheetName);
                });

                updateProgress(90, "Empaquetando resultados...");
                cleanDataWb = newWorkbook;

                setTimeout(() => {
                    updateProgress(100, "¡Listo!");
                    setTimeout(() => {
                        processingUI.classList.add('hidden');
                        successUI.classList.remove('hidden');
                        statsText.innerHTML = `Analizadas y estructuradas con éxito.<br><b>${totalCleaned}</b> celdas modificadas. <br><b>${rowsRemoved}</b> filas vacías eliminadas.`;
                    }, 500);
                }, 800);

            } catch (err) {
                alert("Hubo un error purificando el archivo: " + err.message);
                console.error(err);
                location.reload();
            }
        }

        function updateProgress(percent, text) {
            progressBar.style.width = `${percent}%`;
            if(text) statusText.innerText = text;
        }

        downloadBtn.addEventListener('click', () => {
            if(cleanDataWb) {
                let outName = originalFileName.replace('.xlsx', '_LIMPIO.xlsx').replace('.csv', '_LIMPIO.xlsx');
                if(!outName.includes('_LIMPIO')) outName = outName + '_LIMPIO.xlsx'; // fallback
                XLSX.writeFile(cleanDataWb, outName);
            }
        });

    </script>
</body>
</html>
