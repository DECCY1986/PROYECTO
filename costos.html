<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Costos y Gastos · DIMALCCO SAS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f1f5f9;--s:#fff;--b:#e2e8f0;--bs:#f8fafc;--t:#0f172a;--t2:#475569;--t3:#94a3b8;--ac:#4338ca;--as:#eef2ff;--in:#059669;--ib:#ecfdf5;--ex:#dc2626;--eb:#fef2f2;--w:#d97706;--wb:#fffbeb;--hd:#0f172a;--fn:'Sora',sans-serif;--mo:'DM Mono',monospace;--r:10px;--rsm:6px}
body{font-family:var(--fn);background:var(--bg);color:var(--t);font-size:14px;min-height:100vh}
.hdr{background:var(--hd);color:#f8fafc;padding:18px 28px 20px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.hdr-ey{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#64748b;margin-bottom:3px}
.hdr-ti{font-size:20px;font-weight:600}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1e293b;border-radius:8px;overflow:hidden}
.metric{background:var(--hd);padding:13px 16px}
.metric-lbl{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#64748b;margin-bottom:5px}
.metric-val{font-family:var(--mo);font-size:16px;font-weight:500;color:#f8fafc}
.metric-val.g{color:#34d399}.metric-val.r{color:#f87171}.metric-val.y{color:#fbbf24}
.metric-sub{font-size:10px;color:#475569;margin-top:2px}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 168px)}
.sidebar{background:var(--s);border-right:1px solid var(--b);padding:18px 14px;overflow-y:auto}
.sec-ti{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.proj-item{padding:10px 12px;border:1px solid var(--b);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.proj-item:hover{border-color:var(--ac)}
.proj-item.active{border-color:var(--ac);background:var(--as)}
.proj-code{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:4px}
.proj-name{font-size:12px;font-weight:500;color:var(--t);margin-bottom:6px}
.proj-bar-wrap{height:4px;background:var(--b);border-radius:2px;overflow:hidden}
.proj-bar{height:100%;background:var(--ac);border-radius:2px}
.proj-info{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:4px}
.main{padding:20px 22px}
.tab-bar{display:flex;gap:4px;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:4px;margin-bottom:18px;width:fit-content}
.tab{padding:7px 18px;border-radius:5px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;font-family:var(--fn);transition:all .15s}
.tab.active{background:var(--ac);color:#fff;box-shadow:0 1px 4px rgba(67,56,202,.3)}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.spacer{flex:1}
.btn-pri{display:flex;align-items:center;gap:5px;padding:8px 15px;background:var(--ac);color:#fff;border:none;border-radius:7px;font-family:var(--fn);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-pri:hover{background:#3730a3}
.btn-sec{padding:7px 14px;background:none;border:1px solid var(--b);border-radius:var(--rsm);font-family:var(--fn);font-size:12px;cursor:pointer;color:var(--t2)}
.btn-sec:hover{border-color:var(--t3)}
select,input{font-family:var(--fn);font-size:12px;color:var(--t);background:var(--s);border:1px solid var(--b);border-radius:var(--rsm);padding:6px 9px;outline:none}
select:focus,input:focus{border-color:var(--ac)}
.tbl-wrap{background:var(--s);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:#f8fafc;border-bottom:1px solid var(--b)}
th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
th.num{text-align:right}
td{padding:10px 12px;font-size:12px;color:var(--t);border-bottom:1px solid var(--bs);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
td.num{text-align:right;font-family:var(--mo);font-size:11px}
.tag{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tag-mat{background:#dbeafe;color:#1d4ed8}.tag-mod{background:#dcfce7;color:#15803d}
.tag-cif{background:#fce7f3;color:#be185d}.tag-ga{background:#fef3c7;color:#92400e}
.tag-gv{background:#f3e8ff;color:#7e22ce}.tag-gf{background:#fee2e2;color:#b91c1c}
.btn-del{opacity:0;padding:2px 7px;border:1px solid #fecaca;border-radius:4px;background:none;color:var(--ex);font-size:10px;cursor:pointer;transition:all .15s}
tr:hover .btn-del{opacity:1}.btn-del:hover{background:var(--eb)}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.sum-card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px}
.sum-card-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}
.sum-card-val{font-family:var(--mo);font-size:18px;font-weight:500;color:var(--t);margin-bottom:4px}
.sum-card-sub{font-size:11px;color:var(--t3)}
.cc-bar{height:6px;background:var(--b);border-radius:3px;overflow:hidden;margin-top:8px}
.cc-bar-fill{height:100%;border-radius:3px}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--s);border-radius:14px;padding:26px;width:480px;max-width:95vw;box-shadow:0 20px 40px rgba(0,0,0,.2);animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border:none;background:var(--bg);border-radius:5px;cursor:pointer;font-size:15px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.form-row{margin-bottom:14px}
.form-lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:5px}
.form-row input,.form-row select{width:100%;padding:9px 11px;font-family:var(--fn);font-size:13px;background:var(--bg);border:1px solid var(--b);border-radius:8px;color:var(--t);outline:none}
.form-row input:focus,.form-row select:focus{border-color:var(--ac);background:#fff}
.form-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-ftr{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--b)}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);text-decoration:none;margin-bottom:16px;transition:color .15s}
.back-link:hover{color:var(--ac)}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-ey">DIMALCCO SAS · Módulo Finanzas</div>
      <div class="hdr-ti">Costos y Gastos por Área</div>
    </div>
    <div style="display:flex; align-items:center; gap:16px">
      <button class="btn-pri" onclick="save(); alert('Costos y gastos guardados correctamente')">Guardar Todo</button>
    </div>
  </div>
  <div class="metrics" id="metrics"></div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sec-ti">Proyectos / Órdenes</div>
    <div id="proj-list"></div>
    <button style="width:100%;padding:8px;border:1px dashed var(--b);border-radius:8px;background:none;font-family:var(--fn);font-size:11px;color:var(--t3);cursor:pointer;margin-top:4px" onclick="openModalProj()">+ Nuevo proyecto</button>
  </aside>

  <main class="main">
    <a class="back-link" href="index.html">← Volver al workspace</a>
    <div class="tab-bar">
      <button class="tab active" onclick="setTab('costos',this)">Registro de costos</button>
      <button class="tab" onclick="setTab('resumen',this)">Resumen por área</button>
    </div>

    <div id="tab-costos">
      <div class="toolbar">
        <select id="f-cc" onchange="renderCostos()">
          <option value="all">Todos los centros</option>
          <option value="Producción">Producción</option>
          <option value="Administración">Administración</option>
          <option value="Comercial">Comercial</option>
        </select>
        <select id="f-tipo-c" onchange="renderCostos()">
          <option value="all">Todos los tipos</option>
          <option value="Materiales directos">Materiales</option>
          <option value="Mano de obra directa">M.O.D.</option>
          <option value="CIF">CIF</option>
          <option value="Gasto administrativo">G. Adm.</option>
          <option value="Gasto ventas">G. Ventas</option>
          <option value="Gasto financiero">G. Financiero</option>
        </select>
        <div class="spacer"></div>
        <button class="btn-pri" onclick="openModalCosto()">+ Registrar costo</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Fecha</th><th>Descripción</th><th>Centro costo</th><th>Proyecto</th>
            <th>Tipo</th><th class="num">Valor</th><th></th>
          </tr></thead>
          <tbody id="tbody-costos"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-resumen" style="display:none">
      <div class="summary-grid" id="sum-grid"></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Proyecto</th><th>Cliente</th><th>Estado</th><th class="num">Ppto.</th><th class="num">Real mat.</th><th class="num">Real MOD</th><th class="num">CIF</th><th class="num">Total real</th><th class="num">Margen</th></tr></thead>
          <tbody id="tbody-proyectos"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL: Nuevo proyecto -->
<div class="modal-backdrop" id="modal-proj-bk">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Nuevo proyecto / orden de trabajo</div><button class="modal-close" onclick="closeModalProj()">✕</button></div>
    <div class="form-g2">
      <div class="form-row"><label class="form-lbl">Código *</label><input type="text" id="pj-cod" placeholder="OT-045"></div>
      <div class="form-row"><label class="form-lbl">Cliente</label><input type="text" id="pj-cli" placeholder="Nombre cliente"></div>
    </div>
    <div class="form-row"><label class="form-lbl">Nombre del proyecto *</label><input type="text" id="pj-nombre" placeholder="Cocinas integrales - Res. Cedros"></div>
    <div class="form-g2">
      <div class="form-row"><label class="form-lbl">Fecha inicio</label><input type="date" id="pj-inicio"></div>
      <div class="form-row"><label class="form-lbl">Fecha fin estimada</label><input type="date" id="pj-fin"></div>
    </div>
    <div class="form-g2">
      <div class="form-row"><label class="form-lbl">Presupuesto COP</label><input type="number" id="pj-ppto" placeholder="0" min="0"></div>
      <div class="form-row"><label class="form-lbl">Estado</label>
        <select id="pj-estado"><option value="activo">Activo</option><option value="pausado">Pausado</option><option value="terminado">Terminado</option></select>
      </div>
    </div>
    <div class="modal-ftr"><button class="btn-sec" onclick="closeModalProj()">Cancelar</button><button class="btn-pri" onclick="saveProj()">Guardar</button></div>
  </div>
</div>

<!-- MODAL: Registrar costo -->
<div class="modal-backdrop" id="modal-costo-bk">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Registrar costo / gasto</div><button class="modal-close" onclick="closeModalCosto()">✕</button></div>
    <div class="form-row"><label class="form-lbl">Descripción *</label><input type="text" id="c-desc" placeholder="Ej. Tablas MDF proyecto Cedros"></div>
    <div class="form-g2">
      <div class="form-row"><label class="form-lbl">Fecha *</label><input type="date" id="c-fecha"></div>
      <div class="form-row"><label class="form-lbl">Valor COP *</label><input type="number" id="c-val" placeholder="0" min="0"></div>
    </div>
    <div class="form-g2">
      <div class="form-row"><label class="form-lbl">Centro de costo *</label>
        <select id="c-cc"><option value="Producción">Producción</option><option value="Administración">Administración</option><option value="Comercial">Comercial</option></select>
      </div>
      <div class="form-row"><label class="form-lbl">Tipo de costo *</label>
        <select id="c-tipo">
          <option value="Materiales directos">Materiales directos</option>
          <option value="Mano de obra directa">Mano de obra directa</option>
          <option value="CIF">CIF (Costos ind. fab.)</option>
          <option value="Gasto administrativo">Gasto administrativo</option>
          <option value="Gasto ventas">Gasto de ventas</option>
          <option value="Gasto financiero">Gasto financiero</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label class="form-lbl">Proyecto / Orden de trabajo</label>
      <select id="c-proj"><option value="">Sin asignar (gasto general)</option></select>
    </div>
    <div class="modal-ftr"><button class="btn-sec" onclick="closeModalCosto()">Cancelar</button><button class="btn-pri" onclick="saveCosto()">Registrar</button></div>
  </div>
</div>

<script>
const DB='dim_costos_v1';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmt=v=>'$ '+Math.abs(v).toLocaleString('es-CO');
const fmtDate=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`};
const ago=n=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]};
const todayISO=()=>new Date().toISOString().split('T')[0];
const fwd=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]};

function defaultState(){
  return{
    proyectos:[
      {id:'pj1',codigo:'OT-041',nombre:'Cocinas integrales Res. Cedros',cliente:'Inversiones Cedros',inicio:ago(90),fin:ago(5),ppto:18000000,estado:'terminado'},
      {id:'pj2',codigo:'OT-042',nombre:'Closets Apto. Los Cedros',cliente:'Inversiones Cedros',inicio:ago(60),fin:ago(15),ppto:24000000,estado:'terminado'},
      {id:'pj3',codigo:'OT-043',nombre:'Mobiliario oficinas Tech Solutions',cliente:'Tech Solutions',inicio:ago(25),fin:fwd(20),ppto:32000000,estado:'activo'},
      {id:'pj4',codigo:'OT-044',nombre:'Escritorios oficina piso 4',cliente:'Tech Solutions',inicio:ago(15),fin:fwd(30),ppto:12300000,estado:'activo'}
    ],
    costos:[
      {id:'cs1',fecha:ago(25),desc:'Tablas MDF y triplex OT-043',cc:'Producción',tipo:'Materiales directos',proyecto:'pj3',valor:4200000},
      {id:'cs2',fecha:ago(24),desc:'MOD semana 1 - ebanistas OT-043',cc:'Producción',tipo:'Mano de obra directa',proyecto:'pj3',valor:1800000},
      {id:'cs3',fecha:ago(20),desc:'Herrajes y bisagras OT-043',cc:'Producción',tipo:'Materiales directos',proyecto:'pj3',valor:980000},
      {id:'cs4',fecha:ago(18),desc:'Lacas y acabados OT-043',cc:'Producción',tipo:'Materiales directos',proyecto:'pj3',valor:640000},
      {id:'cs5',fecha:ago(15),desc:'MOD semana 2 - ebanistas OT-043',cc:'Producción',tipo:'Mano de obra directa',proyecto:'pj3',valor:1800000},
      {id:'cs6',fecha:ago(14),desc:'Energía taller mes anterior',cc:'Producción',tipo:'CIF',proyecto:'',valor:380000},
      {id:'cs7',fecha:ago(12),desc:'Tablas y materia prima OT-044',cc:'Producción',tipo:'Materiales directos',proyecto:'pj4',valor:2100000},
      {id:'cs8',fecha:ago(10),desc:'MOD semana 1 OT-044',cc:'Producción',tipo:'Mano de obra directa',proyecto:'pj4',valor:1400000},
      {id:'cs9',fecha:ago(8),desc:'Arriendo y servicios (adm)',cc:'Administración',tipo:'Gasto administrativo',proyecto:'',valor:2680000},
      {id:'cs10',fecha:ago(5),desc:'Transportes entrega OT-042',cc:'Comercial',tipo:'Gasto ventas',proyecto:'pj2',valor:320000},
      {id:'cs11',fecha:ago(3),desc:'Gastos financieros bancarios',cc:'Administración',tipo:'Gasto financiero',proyecto:'',valor:180000},
      {id:'cs12',fecha:ago(2),desc:'MOD semana 3 OT-043',cc:'Producción',tipo:'Mano de obra directa',proyecto:'pj3',valor:1800000}
    ]
  };
}

let S;
function load(){try{const s=localStorage.getItem(DB);if(s)return JSON.parse(s);}catch(e){}return defaultState();}
function save(){localStorage.setItem(DB,JSON.stringify(S));}

const TIPO_TAG={'Materiales directos':'tag-mat','Mano de obra directa':'tag-mod','CIF':'tag-cif','Gasto administrativo':'tag-ga','Gasto ventas':'tag-gv','Gasto financiero':'tag-gf'};
const CC_COLORS={'Producción':'#4338ca','Administración':'#d97706','Comercial':'#059669'};

function renderHeader(){
  let totProd=0,totAdm=0,totCom=0,totGen=0;
  S.costos.forEach(c=>{
    if(c.cc==='Producción')totProd+=c.valor;
    else if(c.cc==='Administración')totAdm+=c.valor;
    else if(c.cc==='Comercial')totCom+=c.valor;
    totGen+=c.valor;
  });
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-lbl">Total costos registrados</div><div class="metric-val y">${fmt(totGen)}</div><div class="metric-sub">${S.costos.length} registros</div></div>
    <div class="metric"><div class="metric-lbl">Producción</div><div class="metric-val">${fmt(totProd)}</div><div class="metric-sub">${totGen>0?Math.round(totProd/totGen*100):0}% del total</div></div>
    <div class="metric"><div class="metric-lbl">Administración</div><div class="metric-val">${fmt(totAdm)}</div><div class="metric-sub">${totGen>0?Math.round(totAdm/totGen*100):0}% del total</div></div>
    <div class="metric"><div class="metric-lbl">Proyectos activos</div><div class="metric-val g">${S.proyectos.filter(p=>p.estado==='activo').length}</div><div class="metric-sub">de ${S.proyectos.length} totales</div></div>`;
}

function renderProjects(){
  const el=document.getElementById('proj-list');
  el.innerHTML=S.proyectos.map(p=>{
    const costos=S.costos.filter(c=>c.proyecto===p.id).reduce((s,c)=>s+c.valor,0);
    const pct=p.ppto>0?Math.min(Math.round(costos/p.ppto*100),100):0;
    const colr=pct>100?'#ef4444':pct>80?'#f59e0b':'#4338ca';
    return`<div class="proj-item ${p.estado==='activo'?'':''}">
      <div class="proj-code">${p.codigo} · <span style="color:${p.estado==='activo'?'var(--in)':p.estado==='terminado'?'var(--t3)':'var(--w)'}">${p.estado}</span></div>
      <div class="proj-name">${p.nombre}</div>
      <div class="proj-bar-wrap"><div class="proj-bar" style="width:${pct}%;background:${colr}"></div></div>
      <div class="proj-info"><span>${fmt(costos)}</span><span>${pct}% de ${fmt(p.ppto)}</span></div>
    </div>`;
  }).join('');
}

function renderCostos(){
  const cc=document.getElementById('f-cc').value;
  const tipo=document.getElementById('f-tipo-c').value;
  const filtered=S.costos.filter(c=>{
    if(cc!=='all'&&c.cc!==cc)return false;
    if(tipo!=='all'&&c.tipo!==tipo)return false;
    return true;
  }).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const tbody=document.getElementById('tbody-costos');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--t3)">No hay costos registrados</td></tr>`;return;}
  tbody.innerHTML=filtered.map(c=>{
    const pj=S.proyectos.find(p=>p.id===c.proyecto);
    return`<tr>
      <td style="font-family:var(--mo);font-size:11px;color:var(--t2);white-space:nowrap">${fmtDate(c.fecha)}</td>
      <td style="font-size:12px;font-weight:500">${c.desc}</td>
      <td><span style="font-size:10px;font-weight:600;color:${CC_COLORS[c.cc]||'var(--t3)'}">${c.cc}</span></td>
      <td style="font-size:11px;color:var(--t3)">${pj?pj.codigo:'—'}</td>
      <td><span class="tag ${TIPO_TAG[c.tipo]||''}">${c.tipo}</span></td>
      <td class="num" style="font-weight:500;color:var(--ex)">${fmt(c.valor)}</td>
      <td><button class="btn-del" onclick="deleteCosto('${c.id}')">×</button></td>
    </tr>`;
  }).join('');
}

function renderResumen(){
  // Summary cards by cost center
  const ccs=['Producción','Administración','Comercial'];
  const total=S.costos.reduce((s,c)=>s+c.valor,0)||1;
  document.getElementById('sum-grid').innerHTML=ccs.map(cc=>{
    const val=S.costos.filter(c=>c.cc===cc).reduce((s,c)=>s+c.valor,0);
    const pct=Math.round(val/total*100);
    const colr=CC_COLORS[cc];
    return`<div class="sum-card">
      <div class="sum-card-lbl" style="color:${colr}">${cc}</div>
      <div class="sum-card-val">${fmt(val)}</div>
      <div class="sum-card-sub">${pct}% del total de costos</div>
      <div class="cc-bar"><div class="cc-bar-fill" style="width:${pct}%;background:${colr}"></div></div>
    </div>`;
  }).join('');

  // Projects table
  const tbody=document.getElementById('tbody-proyectos');
  tbody.innerHTML=S.proyectos.map(p=>{
    const cs=S.costos.filter(c=>c.proyecto===p.id);
    const mat=cs.filter(c=>c.tipo==='Materiales directos').reduce((s,c)=>s+c.valor,0);
    const mod=cs.filter(c=>c.tipo==='Mano de obra directa').reduce((s,c)=>s+c.valor,0);
    const cif=cs.filter(c=>c.tipo==='CIF').reduce((s,c)=>s+c.valor,0);
    const real=mat+mod+cif;
    const margen=p.ppto-real;
    const stClr=p.estado==='activo'?'var(--in)':p.estado==='terminado'?'var(--t3)':'var(--w)';
    return`<tr>
      <td><div style="font-weight:500;font-size:12px">${p.nombre}</div><div style="font-size:10px;color:var(--t3)">${p.codigo}</div></td>
      <td style="font-size:11px;color:var(--t2)">${p.cliente||'—'}</td>
      <td><span style="font-size:10px;font-weight:600;color:${stClr}">${p.estado}</span></td>
      <td class="num">${fmt(p.ppto)}</td>
      <td class="num">${fmt(mat)}</td>
      <td class="num">${fmt(mod)}</td>
      <td class="num">${fmt(cif)}</td>
      <td class="num" style="font-weight:600">${fmt(real)}</td>
      <td class="num" style="font-weight:600;color:${margen>=0?'var(--in)':'var(--ex)'}">${margen>=0?'+':''}${fmt(margen)}</td>
    </tr>`;
  }).join('');
}

function renderAll(){renderHeader();renderProjects();renderCostos();if(document.getElementById('tab-resumen').style.display!=='none')renderResumen();}

function setTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  document.getElementById('tab-costos').style.display=tab==='costos'?'block':'none';
  document.getElementById('tab-resumen').style.display=tab==='resumen'?'block':'none';
  if(tab==='resumen')renderResumen();
}

// Modals
function openModalProj(){
  document.getElementById('pj-inicio').value=todayISO();
  document.getElementById('modal-proj-bk').classList.add('open');
}
function closeModalProj(){document.getElementById('modal-proj-bk').classList.remove('open');}
function saveProj(){
  const nombre=document.getElementById('pj-nombre').value.trim();
  const cod=document.getElementById('pj-cod').value.trim();
  if(!nombre||!cod){alert('Completa los campos obligatorios.');return;}
  S.proyectos.push({id:uid(),codigo:cod,nombre,cliente:document.getElementById('pj-cli').value.trim(),inicio:document.getElementById('pj-inicio').value,fin:document.getElementById('pj-fin').value,ppto:parseFloat(document.getElementById('pj-ppto').value)||0,estado:document.getElementById('pj-estado').value});
  save();closeModalProj();renderAll();
}

function openModalCosto(){
  const sel=document.getElementById('c-proj');
  sel.innerHTML='<option value="">Sin asignar</option>'+S.proyectos.filter(p=>p.estado==='activo').map(p=>`<option value="${p.id}">${p.codigo} · ${p.nombre}</option>`).join('');
  document.getElementById('c-fecha').value=todayISO();
  document.getElementById('c-desc').value='';document.getElementById('c-val').value='';
  document.getElementById('modal-costo-bk').classList.add('open');
}
function closeModalCosto(){document.getElementById('modal-costo-bk').classList.remove('open');}
function saveCosto(){
  const desc=document.getElementById('c-desc').value.trim();
  const val=parseFloat(document.getElementById('c-val').value);
  if(!desc||!val){alert('Completa los campos obligatorios.');return;}
  S.costos.push({id:uid(),fecha:document.getElementById('c-fecha').value,desc,cc:document.getElementById('c-cc').value,tipo:document.getElementById('c-tipo').value,proyecto:document.getElementById('c-proj').value,valor:Math.abs(val)});
  // Sync to Tesorería
  try{
    const ts=JSON.parse(localStorage.getItem('dim_tesoreria_v1')||'null');
    if(ts&&ts.movimientos&&ts.cuentas&&ts.cuentas.length>0){
      const cc=document.getElementById('c-cc').value;
      ts.movimientos.push({id:uid(),fecha:document.getElementById('c-fecha').value,desc,cat:'Proveedores / Materiales',tipo:'egreso',valor:Math.abs(val),cuenta:ts.cuentas[0].id,ref:''});
      localStorage.setItem('dim_tesoreria_v1',JSON.stringify(ts));
    }
  }catch(e){}
  save();closeModalCosto();renderAll();
}

function deleteCosto(id){if(!confirm('¿Eliminar?'))return;S.costos=S.costos.filter(c=>c.id!==id);save();renderAll();}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModalProj();closeModalCosto();}});
['modal-proj-bk','modal-costo-bk'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});});

S=load();renderAll();
</script>
</body>
</html>
